<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Summary View</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-width: 900px;
        min-height: 100vh;
      }
      .summary-page {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
      }
      #largeSummary {
        min-height: 75vh;
        font-size: 15px;
        line-height: 1.65;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main class="summary-page">
      <h1>Large Summary View</h1>
      <p class="muted">A larger read-only view for the most recent bookmark summary.</p>
      <label class="field">
        <span>Summary</span>
        <textarea id="largeSummary" readonly placeholder="No summary generated yet."></textarea>
      </label>
    </main>
    <script src="demo-data.js"></script>
    <script src="summary.js"></script>
  </body>
</html>
